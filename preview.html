<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZapTube | Türk Futbol YouTube Kumandası</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        gs: { primary: '#FFD700', secondary: '#C8102E' },
        fb: { primary: '#003DA5', secondary: '#FFD100' },
        bjk: { primary: '#000000', secondary: '#FFFFFF' },
        ts: { primary: '#6B0D0D', secondary: '#003DA5' },
      }}}
    }
  </script>
  <style>
    body { background: #111827; color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
    .stagger > *:nth-child(1) { animation: slideUp 0.4s ease-out 0.05s forwards; opacity:0; }
    .stagger > *:nth-child(2) { animation: slideUp 0.4s ease-out 0.1s forwards; opacity:0; }
    .stagger > *:nth-child(3) { animation: slideUp 0.4s ease-out 0.15s forwards; opacity:0; }
    .stagger > *:nth-child(4) { animation: slideUp 0.4s ease-out 0.2s forwards; opacity:0; }
    .stagger > *:nth-child(5) { animation: slideUp 0.4s ease-out 0.25s forwards; opacity:0; }
    .stagger > *:nth-child(6) { animation: slideUp 0.4s ease-out 0.3s forwards; opacity:0; }
    .stagger > *:nth-child(7) { animation: slideUp 0.4s ease-out 0.35s forwards; opacity:0; }
    @keyframes pulseLive { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .live-pulse { animation: pulseLive 1.5s ease-in-out infinite; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .animate-fade-in { animation: fadeIn 0.25s ease-out forwards; }
  </style>
</head>
<body class="min-h-screen antialiased">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    // === DATA ===
    const channelDB = {
      channels: [
        { id:"erman-toroglu", name:"Erman Toroğlu", ytId:"UCxQzS8ZbwOz2ePqnkSxBbSA", desc:"Türk futbolunun efsane yorumcusu. Sert ve dobra yorumlarıyla tanınır.", teams:["genel"], contentTypes:["sert-yorum","analiz"], priority:1 },
        { id:"ugur-karakullukcu", name:"Uğur Karakullukçu", ytId:"UCGzx8pA0gMKhPSKiVP8sFOA", desc:"Taktik analiz uzmanı. Maçları derinlemesine analiz eder.", teams:["genel"], contentTypes:["analiz","taktik"], priority:2 },
        { id:"serdar-ali-celikler", name:"Serdar Ali Çelikler", ytId:"UC1H2J4fMg6CNqNLfKN5DXHQ", desc:"Galatasaray ağırlıklı yorumlar. Eğlenceli ve samimi tarzıyla bilinir.", teams:["gs","genel"], contentTypes:["yorum","eglence","canli-yayin"], priority:1 },
        { id:"ali-ece", name:"Ali Ece", ytId:"UCbJmx9-ITJYCqmHCHpMKPfg", desc:"Deneyimli spor muhabiri. Dengeli ve bilgi dolu yorumlar.", teams:["genel"], contentTypes:["analiz","yorum","ozet"], priority:2 },
        { id:"sinan-engin", name:"Sinan Engin", ytId:"UCexample-sinan", desc:"Beşiktaş efsanesi. Sert yorumları ve net tavrıyla tanınır.", teams:["bjk","genel"], contentTypes:["sert-yorum","yorum","canli-yayin"], priority:2 },
        { id:"fenerbahce-youtube", name:"FB TV / Fener Yorumcuları", ytId:"UCexample-fbtv", desc:"Fenerbahçe odaklı içerikler. Maç özetleri ve yorumlar.", teams:["fb"], contentTypes:["ozet","yorum","canli-yayin"], priority:1 },
        { id:"trabzonspor-medya", name:"TS Medya", ytId:"UCexample-tsmedya", desc:"Trabzonspor odaklı içerikler ve yorumlar.", teams:["ts"], contentTypes:["yorum","ozet","canli-yayin"], priority:2 },
      ],
      teams: [
        { id:"genel", name:"Tüm Takımlar", emoji:"⚽", color:"#10B981" },
        { id:"gs", name:"Galatasaray", emoji:"🦁", color:"#C8102E" },
        { id:"fb", name:"Fenerbahçe", emoji:"🐤", color:"#003DA5" },
        { id:"bjk", name:"Beşiktaş", emoji:"🦅", color:"#1a1a1a" },
        { id:"ts", name:"Trabzonspor", emoji:"⭐", color:"#6B0D0D" },
      ],
      contentTypes: [
        { id:"ozet", name:"Maç Özeti", emoji:"🎬", desc:"Maç özetleri ve goller" },
        { id:"analiz", name:"Taktik Analiz", emoji:"📊", desc:"Detaylı taktik ve teknik analizler" },
        { id:"yorum", name:"Yorum", emoji:"🎙️", desc:"Maç sonrası yorumlar" },
        { id:"sert-yorum", name:"Sert Yorum", emoji:"🔥", desc:"Dobra ve sert eleştiriler" },
        { id:"eglence", name:"Caps / Eğlence", emoji:"😂", desc:"Eğlenceli içerikler" },
        { id:"canli-yayin", name:"Canlı Yayın", emoji:"🔴", desc:"Canlı yayınlar ve sohbetler" },
        { id:"taktik", name:"Taktik Board", emoji:"📋", desc:"Taktik tahta analizleri" },
      ]
    };

    // Mock videos — some are "live"
    const mockVideoPool = [
      { id:"v1", title:"Galatasaray - Fenerbahçe Derbisi Analizi | Sert Değerlendirme", ch:"Erman Toroğlu", chId:"erman-toroglu", hrs:2, views:"245K", dur:"18:34", ytVideoId:"dQw4w9WgXcQ", live:false },
      { id:"v2", title:"Süper Lig'de Hakem Skandalları! Bunu Kabul Edemeyiz!", ch:"Erman Toroğlu", chId:"erman-toroglu", hrs:8, views:"189K", dur:"22:10", ytVideoId:"dQw4w9WgXcQ", live:false },
      { id:"v3", title:"Taktik Analiz: Galatasaray'ın 4-3-3 Sistemi Nasıl Çalışıyor?", ch:"Uğur Karakullukçu", chId:"ugur-karakullukcu", hrs:5, views:"98K", dur:"25:45", ytVideoId:"dQw4w9WgXcQ", live:false },
      { id:"v4", title:"Beşiktaş Savunma Zaafiyeti | Detaylı Taktik İnceleme", ch:"Uğur Karakullukçu", chId:"ugur-karakullukcu", hrs:24, views:"76K", dur:"31:20", ytVideoId:"dQw4w9WgXcQ", live:false },
      { id:"v5", title:"🔴 CANLI | Cimbom Şampiyon Olur mu? Canlı Yayın Sohbeti", ch:"Serdar Ali Çelikler", chId:"serdar-ali-celikler", hrs:0, views:"12K izliyor", dur:"CANLI", ytVideoId:"dQw4w9WgXcQ", live:true },
      { id:"v6", title:"Galatasaray Transfer Gündemi | Kim Geliyor Kim Gidiyor?", ch:"Serdar Ali Çelikler", chId:"serdar-ali-celikler", hrs:12, views:"156K", dur:"28:50", ytVideoId:"dQw4w9WgXcQ", live:false },
      { id:"v7", title:"Süper Lig 28. Hafta Değerlendirmesi | Tüm Maçlar", ch:"Ali Ece", chId:"ali-ece", hrs:6, views:"134K", dur:"35:22", ytVideoId:"dQw4w9WgXcQ", live:false },
      { id:"v8", title:"🔴 CANLI | Beşiktaş Maç Sonu Değerlendirme", ch:"Sinan Engin", chId:"sinan-engin", hrs:0, views:"8.5K izliyor", dur:"CANLI", ytVideoId:"dQw4w9WgXcQ", live:true },
      { id:"v9", title:"Fenerbahçe 3-1 Antalyaspor | Maç Özeti ve Goller", ch:"FB TV", chId:"fenerbahce-youtube", hrs:3, views:"450K", dur:"8:30", ytVideoId:"dQw4w9WgXcQ", live:false },
      { id:"v10", title:"Trabzonspor Hafta Sonu Maç Önü | Kadro Analizi", ch:"TS Medya", chId:"trabzonspor-medya", hrs:10, views:"67K", dur:"12:15", ytVideoId:"dQw4w9WgXcQ", live:false },
      { id:"v11", title:"Ali Ece ile Transfer Dedikodları | Kimler Geliyor?", ch:"Ali Ece", chId:"ali-ece", hrs:14, views:"88K", dur:"19:44", ytVideoId:"dQw4w9WgXcQ", live:false },
      { id:"v12", title:"🔴 CANLI | Fenerbahçe Transfer Canlı Yayın", ch:"FB TV", chId:"fenerbahce-youtube", hrs:0, views:"15K izliyor", dur:"CANLI", ytVideoId:"dQw4w9WgXcQ", live:true },
    ];

    function formatTimeAgo(hrs) {
      if (hrs < 1) return "Az önce";
      if (hrs < 24) return `${hrs} saat önce`;
      const days = Math.floor(hrs / 24);
      if (days < 7) return `${days} gün önce`;
      return `${Math.floor(days/7)} hafta önce`;
    }

    // === EMBEDDED PLAYER MODAL ===
    function PlayerModal({ video, onClose }) {
      if (!video) return null;

      // Close on Escape key
      React.useEffect(() => {
        const handler = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [onClose]);

      return (
        <div className="fixed inset-0 z-[100] animate-fade-in" onClick={onClose}>
          {/* Backdrop */}
          <div className="absolute inset-0 bg-black/90 backdrop-blur-sm" />

          {/* Content */}
          <div className="relative z-10 flex flex-col h-full" onClick={(e) => e.stopPropagation()}>
            {/* Top bar */}
            <div className="flex items-center justify-between px-4 py-3 bg-[#111827]/80">
              <div className="flex items-center gap-3 min-w-0">
                {video.live && (
                  <span className="flex items-center gap-1.5 px-2 py-0.5 rounded bg-red-600 text-white text-xs font-bold shrink-0">
                    <span className="w-2 h-2 rounded-full bg-white live-pulse"></span> CANLI
                  </span>
                )}
                <h3 className="text-sm font-medium truncate text-white">{video.title}</h3>
              </div>
              <button onClick={onClose} className="shrink-0 ml-3 w-8 h-8 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 transition-colors text-white text-lg">
                ✕
              </button>
            </div>

            {/* YouTube Embed */}
            <div className="flex-1 flex items-center justify-center px-2 pb-2">
              <div className="w-full max-w-5xl aspect-video rounded-xl overflow-hidden bg-black shadow-2xl">
                <iframe
                  src={`https://www.youtube.com/embed/${video.ytVideoId}?autoplay=1&rel=0&modestbranding=1`}
                  title={video.title}
                  className="w-full h-full"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                  allowFullScreen
                />
              </div>
            </div>

            {/* Bottom info bar */}
            <div className="px-4 py-3 bg-[#111827]/80 flex items-center justify-between">
              <div className="text-sm text-gray-400">
                <span className="text-white font-medium">{video.ch}</span>
                <span className="mx-2">·</span>
                <span>{video.views} {video.live ? '' : 'izlenme'}</span>
                {!video.live && <><span className="mx-2">·</span><span>{formatTimeAgo(video.hrs)}</span></>}
              </div>
              <a href={`https://www.youtube.com/watch?v=${video.ytVideoId}`} target="_blank" rel="noopener noreferrer"
                className="text-xs px-3 py-1.5 rounded-full bg-red-600/20 text-red-400 hover:bg-red-600/30 transition-colors">
                YouTube'da Aç ↗
              </a>
            </div>
          </div>
        </div>
      );
    }

    // === LIVE BANNER ===
    function LiveBanner({ liveVideos, onSelect }) {
      if (liveVideos.length === 0) return null;
      return (
        <section className="mb-6 animate-slide-up">
          <h3 className="text-sm font-medium text-gray-500 mb-3 flex items-center gap-2">
            <span className="w-2 h-2 rounded-full bg-red-500 live-pulse"></span>
            <span className="text-red-400 font-semibold">Şu An Canlı</span>
            <span className="text-gray-600 text-xs">({liveVideos.length} yayın)</span>
          </h3>
          <div className="flex gap-3 overflow-x-auto pb-2 -mx-4 px-4" style={{scrollSnapType:"x mandatory"}}>
            {liveVideos.map(video => (
              <button key={video.id} onClick={() => onSelect(video)}
                className="flex-shrink-0 w-72 bg-gradient-to-br from-red-950/40 to-[#1a1a1a] hover:from-red-950/60 border border-red-500/20 hover:border-red-500/40 rounded-xl overflow-hidden transition-all hover:scale-[1.02] group text-left"
                style={{scrollSnapAlign:"start"}}>
                {/* Mini thumbnail area */}
                <div className="relative aspect-video bg-gradient-to-br from-gray-800 to-gray-900">
                  <div className="absolute inset-0 flex items-center justify-center">
                    <div className="w-12 h-12 rounded-full bg-red-600/80 flex items-center justify-center group-hover:scale-110 transition-transform">
                      <svg className="w-5 h-5 text-white ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                  </div>
                  <div className="absolute top-2 left-2 flex items-center gap-1.5 px-2 py-0.5 rounded bg-red-600 text-white text-[10px] font-bold">
                    <span className="w-1.5 h-1.5 rounded-full bg-white live-pulse"></span> CANLI
                  </div>
                  <div className="absolute bottom-2 right-2 text-[10px] text-white/70 bg-black/60 px-1.5 py-0.5 rounded">
                    {video.views}
                  </div>
                </div>
                <div className="p-3">
                  <p className="text-sm font-medium line-clamp-2 group-hover:text-red-400 transition-colors leading-snug">{video.title}</p>
                  <p className="text-[11px] text-gray-500 mt-1">{video.ch}</p>
                </div>
              </button>
            ))}
          </div>
        </section>
      );
    }

    // === MAIN APP ===
    function App() {
      const [selectedTeam, setSelectedTeam] = useState(null);
      const [selectedContent, setSelectedContent] = useState(null);
      const [activeVideo, setActiveVideo] = useState(null);

      const filteredChannels = useMemo(() => {
        return channelDB.channels.filter(ch => {
          const tm = !selectedTeam || selectedTeam === "genel" || ch.teams.includes(selectedTeam) || ch.teams.includes("genel");
          const ct = !selectedContent || ch.contentTypes.includes(selectedContent);
          return tm && ct;
        });
      }, [selectedTeam, selectedContent]);

      const allVideos = useMemo(() => {
        const ids = filteredChannels.map(c => c.id);
        return mockVideoPool.filter(v => ids.includes(v.chId));
      }, [filteredChannels]);

      const liveVideos = useMemo(() => allVideos.filter(v => v.live), [allVideos]);
      const regularVideos = useMemo(() => allVideos.filter(v => !v.live).sort((a,b) => a.hrs - b.hrs), [allVideos]);

      const reset = () => { setSelectedTeam(null); setSelectedContent(null); };

      return (
        <main className="min-h-screen pb-20">
          {/* Player Modal */}
          <PlayerModal video={activeVideo} onClose={() => setActiveVideo(null)} />

          {/* Header */}
          <header className="sticky top-0 z-50 border-b border-white/5" style={{background:"rgba(17,24,39,0.95)", backdropFilter:"blur(8px)"}}>
            <div className="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <span className="text-2xl">📺</span>
                <div>
                  <h1 className="text-lg font-bold tracking-tight">
                    <span className="bg-gradient-to-r from-red-500 to-emerald-400 bg-clip-text text-transparent">Zap</span>Tube
                  </h1>
                  <p className="text-xs text-gray-500 hidden sm:block">YouTube futbol kumandan</p>
                </div>
              </div>
              <div className="flex items-center gap-2">
                {liveVideos.length > 0 && (
                  <span className="flex items-center gap-1.5 text-xs text-red-400">
                    <span className="w-2 h-2 rounded-full bg-red-500 live-pulse"></span>
                    {liveVideos.length} Canlı
                  </span>
                )}
                {(selectedTeam || selectedContent) && (
                  <button onClick={reset} className="text-xs px-3 py-1.5 rounded-full bg-white/5 hover:bg-white/10 transition-colors text-gray-400">
                    Sıfırla
                  </button>
                )}
              </div>
            </div>
          </header>

          <div className="max-w-6xl mx-auto px-4 mt-6">
            {/* Hero */}
            {!selectedTeam && !selectedContent && (
              <div className="text-center mb-8 animate-slide-up">
                <h2 className="text-3xl sm:text-4xl font-bold mb-2">
                  <span className="bg-gradient-to-r from-red-500 to-emerald-400 bg-clip-text text-transparent">Zap Yap!</span> ⚡
                </h2>
                <p className="text-gray-400 text-sm sm:text-base max-w-md mx-auto">
                  Takımını seç, ne izlemek istediğini belirle — seni doğru kanala zaplarız.
                </p>
              </div>
            )}

            {/* Step 1: Team Selection */}
            <section className="mb-6">
              <h3 className="text-sm font-medium text-gray-500 mb-3 flex items-center gap-2">
                <span className="w-5 h-5 rounded-full bg-emerald-500/20 text-emerald-400 text-xs flex items-center justify-center font-bold">1</span>
                Takımını Seç
              </h3>
              <div className="flex flex-wrap gap-2 stagger">
                {channelDB.teams.map(team => {
                  const active = selectedTeam === team.id;
                  return (
                    <button key={team.id}
                      onClick={() => setSelectedTeam(active ? null : team.id)}
                      className={`flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 ${
                        active ? 'scale-105 shadow-lg' : 'bg-[#1e293b] hover:bg-[#334155] text-gray-300 hover:text-white'
                      }`}
                      style={active ? {
                        backgroundColor: team.color + '22',
                        color: team.color === '#1a1a1a' ? '#fff' : team.color,
                        boxShadow: `0 0 20px ${team.color}33, inset 0 0 0 1px ${team.color}55`,
                      } : undefined}
                    >
                      <span className="text-lg">{team.emoji}</span>
                      <span>{team.name}</span>
                    </button>
                  );
                })}
              </div>
            </section>

            {/* Step 2: Content Type */}
            <section className="mb-8">
              <h3 className="text-sm font-medium text-gray-500 mb-3 flex items-center gap-2">
                <span className="w-5 h-5 rounded-full bg-emerald-500/20 text-emerald-400 text-xs flex items-center justify-center font-bold">2</span>
                Ne İzlemek İstiyorsun?
              </h3>
              <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2 stagger">
                {channelDB.contentTypes.map(ct => {
                  const active = selectedContent === ct.id;
                  return (
                    <button key={ct.id}
                      onClick={() => setSelectedContent(active ? null : ct.id)}
                      className={`flex flex-col items-center gap-1.5 px-3 py-3 rounded-xl text-sm transition-all duration-200 ${
                        active ? 'bg-emerald-500/15 ring-1 ring-emerald-500/50 text-emerald-300 scale-105' : 'bg-[#1e293b] hover:bg-[#334155] text-gray-400 hover:text-white'
                      }`}
                    >
                      <span className="text-xl">{ct.emoji}</span>
                      <span className="font-medium text-xs">{ct.name}</span>
                    </button>
                  );
                })}
              </div>
            </section>

            {/* Active Filters */}
            {(selectedTeam || selectedContent) && (
              <div className="flex flex-wrap items-center gap-2 mb-4 text-sm text-gray-400 animate-slide-up">
                <span>🔍</span>
                {selectedTeam && (
                  <span className="px-2 py-0.5 rounded-md bg-white/5">
                    {channelDB.teams.find(t=>t.id===selectedTeam)?.emoji} {channelDB.teams.find(t=>t.id===selectedTeam)?.name}
                  </span>
                )}
                {selectedContent && (
                  <span className="px-2 py-0.5 rounded-md bg-white/5">
                    {channelDB.contentTypes.find(c=>c.id===selectedContent)?.emoji} {channelDB.contentTypes.find(c=>c.id===selectedContent)?.name}
                  </span>
                )}
                <span className="text-gray-600">— {filteredChannels.length} kanal, {allVideos.length} video</span>
              </div>
            )}

            {/* LIVE SECTION */}
            <LiveBanner liveVideos={liveVideos} onSelect={setActiveVideo} />

            {/* Matching Channels */}
            {filteredChannels.length > 0 && (selectedTeam || selectedContent) && (
              <section className="mb-6 animate-slide-up">
                <h3 className="text-sm font-medium text-gray-500 mb-3">📡 Eşleşen Kanallar</h3>
                <div className="flex gap-3 overflow-x-auto pb-2 -mx-4 px-4" style={{scrollSnapType:"x mandatory"}}>
                  {filteredChannels.map(ch => (
                    <a key={ch.id} href={`https://www.youtube.com/channel/${ch.ytId}`} target="_blank" rel="noopener noreferrer"
                      className="flex-shrink-0 bg-[#1e293b] hover:bg-[#334155] rounded-xl p-3 w-48 transition-all hover:scale-[1.02] group"
                      style={{scrollSnapAlign:"start"}}>
                      <div className="flex items-center gap-3 mb-2">
                        <div className="w-10 h-10 rounded-full bg-gradient-to-br from-gray-700 to-gray-800 flex items-center justify-center text-lg font-bold shrink-0">
                          {ch.name[0]}
                        </div>
                        <div className="min-w-0">
                          <p className="text-sm font-medium truncate group-hover:text-emerald-400 transition-colors">{ch.name}</p>
                          <div className="flex gap-1 mt-0.5">
                            {ch.teams.map(t => (
                              <span key={t} className="text-[10px] px-1.5 py-0.5 rounded bg-white/5 text-gray-500">
                                {channelDB.teams.find(team=>team.id===t)?.emoji}
                              </span>
                            ))}
                          </div>
                        </div>
                      </div>
                      <p className="text-[11px] text-gray-500 line-clamp-2">{ch.desc}</p>
                    </a>
                  ))}
                </div>
              </section>
            )}

            {/* Videos Grid — click opens embed, not YouTube */}
            <section>
              <h3 className="text-sm font-medium text-gray-500 mb-3 flex items-center gap-2">
                🎬 {selectedTeam || selectedContent ? 'Önerilen Videolar' : 'Son Videolar'}
              </h3>
              {regularVideos.length > 0 ? (
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 stagger">
                  {regularVideos.map(video => (
                    <button key={video.id} onClick={() => setActiveVideo(video)}
                      className="group bg-[#1e293b] hover:bg-[#334155] rounded-xl overflow-hidden transition-all duration-200 hover:scale-[1.02] hover:shadow-xl hover:shadow-black/20 text-left w-full">
                      {/* Thumbnail */}
                      <div className="relative aspect-video bg-gray-800">
                        <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent z-10" />
                        <div className="absolute inset-0 flex items-center justify-center bg-gradient-to-br from-gray-700 to-gray-900">
                          <div className="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center group-hover:bg-white/20 group-hover:scale-110 transition-all">
                            <svg className="w-5 h-5 text-white ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                          </div>
                        </div>
                        <span className="absolute bottom-2 right-2 z-20 text-[10px] font-medium bg-black/80 px-1.5 py-0.5 rounded">{video.dur}</span>
                      </div>
                      {/* Info */}
                      <div className="p-3">
                        <h4 className="text-sm font-medium line-clamp-2 group-hover:text-emerald-400 transition-colors leading-snug mb-2">{video.title}</h4>
                        <div className="flex items-center justify-between text-[11px] text-gray-500">
                          <span className="truncate">{video.ch}</span>
                          <div className="flex items-center gap-2 flex-shrink-0 ml-2">
                            <span>{video.views} izlenme</span>
                            <span>{formatTimeAgo(video.hrs)}</span>
                          </div>
                        </div>
                      </div>
                    </button>
                  ))}
                </div>
              ) : (
                <div className="text-center py-16 text-gray-600">
                  <span className="text-4xl block mb-3">📺</span>
                  <p className="text-sm">Bu filtrelere uygun video bulunamadı.</p>
                  <p className="text-xs mt-1">Farklı bir takım veya içerik tipi deneyin.</p>
                </div>
              )}
            </section>
          </div>

          {/* Footer */}
          <footer className="mt-16 border-t border-white/5 py-6 text-center text-xs text-gray-600">
            <p>ZapTube — YouTube futbol kumandan</p>
            <p className="mt-1">Zap yap, doğru kanala ulaş, keyfine bak ⚽⚡</p>
          </footer>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
